<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Command Center | Data Sorcerers</title>
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/admin.css">
</head>
<body>

    <div id="navbar-container"></div>

    <main class="admin-container">
        <div class="panel">
            <div class="panel-title">
                <span>PROTOKOL MIGRASI DATA (ENROLLMENT)</span>
            </div>
            
            <div class="form-group">
                <label for="crewIdInput">TARGET CREW ID (Misal: DS-ID-01)</label>
                <input type="text" id="crewIdInput" placeholder="Masukkan ID Kru..." autocomplete="off">
            </div>

            <div class="form-group">
                <label for="imageUpload">UNGGAH BUKTI FOTO</label>
                <input type="file" id="imageUpload" accept="image/*">
            </div>

            <button class="btn-spaceship" id="extractBtn" style="width: 100%; padding: 10px;">
                EKSTRAK BIO-DATA
            </button>

            <div class="preview-area" id="previewContainer">
                <span id="placeholderText" style="color: #666;">Menunggu Input Visual...</span>
                <img id="uploadedImage" src="" alt="Preview">
                <canvas id="overlayCanvas"></canvas>
            </div>
        </div>

        <div class="panel">
            <div class="panel-title">
                <span>TERMINAL LOG SISTEM</span>
                <span id="modelStatus" style="color: #f59e0b; font-size: 0.8rem;">Memuat AI...</span>
            </div>
            <div class="terminal-log" id="systemLog">
                <div class="log-entry">> Sistem diinisialisasi. Menunggu otorisasi admin...</div>
            </div>
            
            <button class="btn-spaceship" id="saveDbBtn" style="width: 100%; padding: 10px; margin-top: 15px; border-color: #10b981; color: #10b981; display: none;">
                SIMPAN KE DATABASE ORBITAL
            </button>
        </div>
    </main>

    <div id="footer-container"></div>

    <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>

    <script src="js/core.js"></script>

    <script src="js/api.js"></script>

    <script src="js/admin.js"></script>
</body>
</html>
