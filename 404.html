<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404: SIGNAL LOST | Data Sorcerers</title>
    <link rel='stylesheet' href='https://cdn-uicons.flaticon.com/2.1.0/uicons-regular-rounded/css/uicons-regular-rounded.css'>
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/components.css">
    <style>
        .error-wrapper {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
            background: radial-gradient(circle at center, rgba(14, 165, 233, 0.1) 0%, rgba(2, 6, 23, 1) 70%);
        }

        .error-code {
            font-size: 8rem;
            font-weight: 900;
            color: var(--accent-neon);
            text-shadow: 0 0 20px var(--accent-glow);
            margin: 0;
            line-height: 1;
        }

        .error-title {
            font-size: 1.5rem;
            letter-spacing: 5px;
            text-transform: uppercase;
            margin: 20px 0;
            color: #fff;
        }

        .error-msg {
            color: var(--text-secondary);
            max-width: 500px;
            margin-bottom: 30px;
            line-height: 1.6;
            font-family: monospace;
        }

        .glitch-line {
            width: 100px;
            height: 2px;
            background: var(--accent-neon);
            box-shadow: 0 0 10px var(--accent-neon);
            margin-bottom: 30px;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; width: 100px; }
            50% { opacity: 0.3; width: 150px; }
        }

        .btn-return {
            background: var(--accent-neon);
            color: #000;
            padding: 12px 30px;
            text-decoration: none;
            font-weight: 800;
            letter-spacing: 2px;
            border-radius: 4px;
            transition: 0.3s;
        }

        .btn-return:hover {
            box-shadow: 0 0 20px var(--accent-neon);
            transform: translateY(-3px);
        }
    </style>
</head>
<body class="orbital-layout">

    <div id="navbar-container"></div>

    <main class="error-wrapper">
        <h1 class="error-code">404</h1>
        <div class="glitch-line"></div>
        <h2 class="error-title">SIGNAL LOST IN SECTOR</h2>
        <p class="error-msg">
            [ERROR_REPORT]: Koordinat yang Anda tuju tidak ditemukan dalam manifes orbital. 
            Kemungkinan halaman telah didelete atau dipindahkan ke sektor rahasia.
        </p>
        
        <a href="index.html" class="btn-return">
            <i class="fi fi-rr-arrow-left"></i> RETURN TO BASE
        </a>
    </main>

    <div id="footer-container"></div>

    <script src="js/core.js"></script>
</body>
</html>
